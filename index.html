<head>

    name="twitter:description"
    content="Real-time global counters for population, environment, economy, technology, and global risk."

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0D58BVYWTK"></script>
  <script>
    let homepageData = null;

    const accordionItems = document.querySelectorAll(".accordion-item");

    function openAccordionItem(targetItem, doScroll = false) {
      const contents = document.querySelectorAll(".accordion-content");
      const isOpen = targetItem.classList.contains("open");

      accordionItems.forEach(i => i.classList.remove("open"));
      contents.forEach(c => {
        c.classList.remove("open");
        c.style.maxHeight = null;
      });

      if (!isOpen) {
        const content = targetItem.nextElementSibling;
        if (content && content.classList.contains("accordion-content")) {
          targetItem.classList.add("open");
          content.classList.add("open");
          content.style.maxHeight = content.scrollHeight + "px";

          if (doScroll) {
            targetItem.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        }
      }
    }

    accordionItems.forEach((item) => {
      item.addEventListener("click", () => {
        openAccordionItem(item, false);
      });
    });

    const highlightCards = document.querySelectorAll(".highlight-card[data-open-section]");
    highlightCards.forEach(card => {
      card.addEventListener("click", () => {
        const sectionKey = card.dataset.openSection;
        const targetItem = document.querySelector('.accordion-item[data-section="' + sectionKey + '"]');
        if (targetItem) {
          openAccordionItem(targetItem, true);
        }
      });
    });

    function formatNumber(value) {
      return Math.floor(Math.max(0, value))
        .toString()
        .replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function secondsInUtcYear(year) {
      const start = Date.UTC(year, 0, 1);
      const end = Date.UTC(year + 1, 0, 1);
      return (end - start) / 1000;
    }

    function getUtcNow() {
      return new Date();
    }

    function elapsedSecondsInCurrentYear(nowUtc) {
      const yearStart = Date.UTC(nowUtc.getUTCFullYear(), 0, 1, 0, 0, 0);
      return (nowUtc.getTime() - yearStart) / 1000;
    }

    function renderRiskWidget() {
      const risk = homepageData.risk;
      document.getElementById("heroEyebrow").innerHTML = `
        <span class="live-dot"></span>
        Live global counters · ${homepageData.reportDate}
      `;
      document.getElementById("riskWidgetLabel").textContent = `Today’s Global Risk · ${homepageData.reportDate}`;
      document.getElementById("riskScoreValue").textContent = `${risk.score} / 100`;
      document.getElementById("riskDescription").textContent = risk.description;

      const trendEl = document.getElementById("riskTrend");
      trendEl.textContent = risk.trendText;
      trendEl.className = risk.trendClass;

      const fill = document.getElementById("riskFill");
      fill.style.width = `${risk.score}%`;

      const badges = document.getElementById("riskBadges");
      badges.innerHTML = `
        <span class="badge badge-high">${risk.label}</span>
        <span class="badge badge-ai">${risk.secondaryBadge}</span>
      `;
    }

    function updatePopulation(nowUtc) {
      const baseDate = new Date(homepageData.population.baseDateUtc);
      let populationNow = homepageData.population.basePopulation;

      if (nowUtc > baseDate) {
        let year = baseDate.getUTCFullYear();
        let cursor = baseDate.getTime();
        const currentTime = nowUtc.getTime();

        while (cursor < currentTime) {
          const yearEnd = Date.UTC(year + 1, 0, 1, 0, 0, 0);
          const segmentEnd = Math.min(yearEnd, currentTime);
          const elapsedSeconds = (segmentEnd - cursor) / 1000;
          const secInYear = secondsInUtcYear(year);
          const netAnnualChange = homepageData.annualStats.Births - homepageData.annualStats.Deaths;

          populationNow += (netAnnualChange / secInYear) * elapsedSeconds;

          cursor = segmentEnd;
          year += 1;
        }
      }

      const populationText = formatNumber(populationNow);

      const popMain = document.getElementById("population");
      if (popMain) popMain.innerText = populationText;

      const popHero = document.getElementById("populationHero");
      if (popHero) popHero.innerText = populationText;
    }

    function updateMetric(key, annualValue, secToday, secThisMonth, secThisYear, secInYear) {
      const ratePerSecond = annualValue / secInYear;

      const dailyEl = document.getElementById("daily" + key);
      const monthlyEl = document.getElementById("monthly" + key);
      const yearlyEl = document.getElementById("yearly" + key);

      if (dailyEl) dailyEl.innerText = formatNumber(ratePerSecond * secToday);
      if (monthlyEl) monthlyEl.innerText = formatNumber(ratePerSecond * secThisMonth);
      if (yearlyEl) yearlyEl.innerText = formatNumber(ratePerSecond * secThisYear);
    }

    function syncSummary() {
      const pairs = [
        ["summaryBirths", "dailyBirths"],
        ["summaryDeaths", "dailyDeaths"],
        ["summaryCO2", "dailyCO2"],
        ["summaryAIText", "dailyAIText"]
      ];

      pairs.forEach(([summaryId, sourceId]) => {
        const summaryEl = document.getElementById(summaryId);
        const sourceEl = document.getElementById(sourceId);
        if (summaryEl && sourceEl) summaryEl.innerText = sourceEl.innerText;
      });
    }

    function updateCounters() {
      const nowUtc = getUtcNow();
      const currentYear = nowUtc.getUTCFullYear();

      const yearStart = new Date(Date.UTC(currentYear, 0, 1));
      const monthStart = new Date(Date.UTC(currentYear, nowUtc.getUTCMonth(), 1));
      const dayStart = new Date(Date.UTC(currentYear, nowUtc.getUTCMonth(), nowUtc.getUTCDate()));

      const secThisYear = (nowUtc.getTime() - yearStart.getTime()) / 1000;
      const secThisMonth = (nowUtc.getTime() - monthStart.getTime()) / 1000;
      const secToday = (nowUtc.getTime() - dayStart.getTime()) / 1000;
      const secInYear = secondsInUtcYear(currentYear);

      updatePopulation(nowUtc);

      homepageData.groupedCounters.forEach(group => {
        group.forEach(key => {
          updateMetric(
            key,
            homepageData.annualStats[key],
            secToday,
            secThisMonth,
            secThisYear,
            secInYear
          );
        });
      });

      syncSummary();
    }


    async function initHomepage() {
      try {
        const response = await fetch("data/home.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`home.json yüklenemedi: ${response.status}`);
        homepageData = await response.json();

        renderRiskWidget();
        updateCounters();
        setInterval(updateCounters, 1000);
      } catch (error) {
        console.error("Ana sayfa verisi yüklenirken hata oluştu:", error);
      }
    }

    initHomepage();
  </script>
</body>
</html>
